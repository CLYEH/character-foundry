name: Mutation Drift (T-060)

# Nightly mutmut sweep against high-trust modules (errors envelope, AI
# circuit breaker, auth). Runs detached from PR CI (`pr.yml`) — a single
# mutmut pass over the configured `paths_to_mutate` takes 30+ minutes;
# blocking PRs on it would suffocate the loop. Failure mode is an
# auto-filed `mutation-drift` issue, mirroring T-058's provider-drift
# pattern.

on:
  schedule:
    # 03:00 UTC nightly — staggered three hours after the provider
    # contract replay (`provider-contract.yml` runs at 00:00 UTC) so the
    # two long jobs don't fight for the same Actions concurrency slot.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  # Serialize all mutmut runs. A manual dispatch arriving mid-nightly
  # waits its turn instead of clobbering an in-flight sweep; this keeps
  # the `mutation-drift` signal coherent.
  group: mutation-drift
  cancel-in-progress: false

jobs:
  mutation-drift:
    name: nightly mutation sweep
    runs-on: ubuntu-latest
    # Wall-clock guard. A normal run lands well under 60 min on
    # `ubuntu-latest`; a 120 min cap leaves slack for slow shared runners
    # while still bailing out before a runaway run consumes credit
    # endlessly. Tighten as baseline runtime stabilises.
    timeout-minutes: 120
    permissions:
      # Required to file the auto-`mutation-drift` issue.
      issues: write
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
      # `pyproject.toml` defaults `addopts = ["-m", "not real_provider"]`
      # which mutmut inherits, so live-provider tests stay off in the
      # mutated workspace by construction.
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/test
      DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install api (dev extras)
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Run mutmut
        id: mutmut
        working-directory: api
        # `mutmut run` returns non-zero whenever any survivor exists,
        # which is normal for a baseline (kill rate < 100 %). Surface
        # the exit code but don't fail the step — drift detection below
        # is what decides if the workflow goes red.
        continue-on-error: true
        run: |
          mutmut run
          echo "mutmut_exit=$?" >> "$GITHUB_OUTPUT"
          mutmut export-cicd-stats

      - name: Show summary
        # Always print mutmut's own results table to the workflow log so
        # operators can eyeball survivors without downloading artifacts.
        if: always()
        working-directory: api
        continue-on-error: true
        run: mutmut results

      - name: Check drift vs baseline
        id: drift
        working-directory: api
        # Bubble the script's exit code up: 0 ok / 1 drift / 2 infra. We
        # branch on those in the issue-opening step below.
        continue-on-error: true
        run: |
          python scripts/check_mutation_drift.py \
            --stats mutants/mutmut-cicd-stats.json \
            --baseline ../.harness/mutation-baseline.json \
            | tee drift-report.txt
          echo "drift_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Ensure `mutation-drift` label exists
        if: steps.drift.outputs.drift_exit == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create mutation-drift \
            --color B60205 \
            --description "Nightly mutmut kill-rate drift (T-060)" \
            --force

      - name: Open or update mutation-drift issue
        if: steps.drift.outputs.drift_exit == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('api/drift-report.txt')
              ? fs.readFileSync('api/drift-report.txt', 'utf8')
              : '(no drift-report.txt produced — check workflow log for the actual error)';
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Mutation kill rate regressed on ${date}.`,
              ``,
              `**Workflow run:** ${runUrl}`,
              `**Trigger:** \`${context.eventName}\``,
              ``,
              `**Triage:** the drop is not automatically a bug — it can be a test`,
              `assertion that grew looser, dead code mutmut found a fresh hole in,`,
              `or a mutmut false positive (rare but not zero). Compare against`,
              `recent diffs to \`app/core/errors.py\` / \`app/ai/circuit.py\` /`,
              `\`app/auth/*\` and either tighten the offending test or update the`,
              `baseline in \`.harness/mutation-baseline.json\` (with rationale in`,
              `the commit message).`,
              ``,
              `**Drift report:**`,
              ``,
              '```',
              report,
              '```',
            ].join('\n');

            // Dedupe within a 72 h sliding window so consecutive nightly
            // regressions stack as comments instead of multiplying issues —
            // matches T-058's provider-drift dedup logic (see
            // `.github/workflows/provider-contract.yml` for the why).
            //
            // `listForRepo` returns PRs as a subtype of issue; filter them
            // out so the dedup never attaches drift state to a PR by
            // accident (Codex PR #76 round-9 finding).
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'mutation-drift',
              state: 'open',
              per_page: 10,
              sort: 'updated',
              direction: 'desc',
            });
            const lookbackMs = 72 * 60 * 60 * 1000;
            const cutoff = Date.now() - lookbackMs;
            const recent = open.data.find(i =>
              !i.pull_request && new Date(i.updated_at).getTime() >= cutoff
            );

            if (recent) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recent.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[mutation-drift] Nightly mutmut kill rate regressed (${date})`,
                labels: ['mutation-drift'],
                body,
              });
            }

      - name: Fail the run on infra error
        # Exit code 2 = the drift checker couldn't get a kill-rate signal
        # (missing JSON, no evaluable mutants, etc.). That's distinct
        # from "kill rate dropped" — there is nothing to dedup against
        # so we fail the workflow loudly instead of filing a drift
        # issue. The earlier steps' logs explain why.
        if: steps.drift.outputs.drift_exit == '2'
        run: |
          echo "::error::Mutation drift check returned exit code 2 — see earlier steps for the actual error."
          exit 1

      - name: Upload mutmut artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-output
          path: |
            api/mutants/mutmut-cicd-stats.json
            api/mutants/mutmut-stats.json
            api/drift-report.txt
          retention-days: 30
