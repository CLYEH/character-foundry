name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Security scan (T-061, Harness A4).
  #
  # Three tools, all in one job so they share the checkout / Python setup
  # cost. Runs in parallel with backend-lint-test and frontend-lint-test
  # (no `needs:`) so the wallclock impact is roughly bandit + semgrep,
  # not summed against the rest of CI. The 20%-of-existing-time budget in
  # the ticket is comfortably met because of that parallelism.
  #
  # MUST run before any branch lands a real OAuth `client_secret`
  # (T-053). Removing or disabling this job in service of "let me just
  # merge this quick fix" is a regression — flag it in review.
  # -------------------------------------------------------------------------
  security:
    name: security (gitleaks + bandit + semgrep)
    runs-on: ubuntu-latest
    # gitleaks-action calls `GET /repos/{owner}/{repo}/pulls/{N}/commits`
    # to enumerate the PR's commit range. On repos where the default
    # `GITHUB_TOKEN` is scoped to `contents: read` only (the GitHub-side
    # "Read repository contents and packages" preset), that call returns
    # 403 "Resource not accessible by integration" and the step fails
    # before any scanning happens. Granting `pull-requests: read` at job
    # level (not workflow level) keeps the elevated permission scoped to
    # the security scan and out of the other jobs.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks-action diffs the PR's commit range against the base
          # branch, so the full history of the PR must be present.
          # Shallow clones drop earlier commits and let secrets land via
          # "looks fine in the latest commit" submissions.
          fetch-depth: 0

      - name: Gitleaks
        # Scans the PR's commit range against `gitleaks.toml`. The action
        # auto-detects `pull_request` events and uses `git log base..head`.
        #
        # `GITLEAKS_VERSION` pins the binary the action downloads so it
        # matches the pre-commit hook's `rev:` in `.pre-commit-config.yaml`
        # — otherwise the action floats with its own release cadence and
        # pre-commit / CI can disagree on the rule set ("works on my
        # machine, blocked in CI" or vice versa). Bump both together.
        #
        # `GITLEAKS_LICENSE` is **only required if this repo moves under
        # a GitHub Organization account**. The repo currently lives under
        # a user, so the action runs licence-free; if/when it migrates,
        # set the secret here OR swap for a setup-go + binary install to
        # keep CI green.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.18.4"
          # Pin the config path explicitly rather than relying on the
          # action's auto-discovery (some versions only check
          # `gitleaks.toml`, others only `.gitleaks.toml`). With the
          # dotfile name in place locally for pre-commit auto-discovery,
          # CI must be told where to look — otherwise the action falls
          # back to default rules and the allowlist becomes a no-op on
          # the CI side. Surfaced by T-061 Codex review (PR #80).
          GITLEAKS_CONFIG: .gitleaks.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install api (dev extras)
        # Reuses the same dev extras as backend-lint-test so bandit and
        # semgrep versions track `api/pyproject.toml`. Slight duplication
        # of the install step is the trade-off for keeping the job in
        # parallel — pulling it into backend-lint-test would serialize
        # ~2 min of semgrep behind the test suite.
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Bandit
        working-directory: api
        # `-c pyproject.toml` honours `[tool.bandit] exclude_dirs`.
        # `-ll` raises the severity floor to MEDIUM so the baseline
        # doesn't trip on every B404 (`subprocess` import) — bump back
        # to default if real LOW-severity findings appear worth gating.
        run: bandit -c pyproject.toml -r app/ -ll

      - name: Semgrep
        working-directory: api
        env:
          # Disable anonymous usage telemetry to the Semgrep registry —
          # the rules are still fetched, only the metrics POST is gated.
          SEMGREP_SEND_METRICS: "off"
        # `--error` exits non-zero on findings; `--config p/owasp-top-ten`
        # pulls the curated rule pack at scan time so we don't pin rule
        # versions in-repo. Scope is the live application module only;
        # tests / alembic / mutants are handled via `.semgrepignore`.
        run: semgrep scan --config p/owasp-top-ten --error --metrics=off app/

  backend-lint-test:
    name: backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install api (dev extras)
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: api
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        working-directory: api
        run: mypy app/

      - name: Pytest (with coverage gate)
        # `fail_under` lives in pyproject.toml `[tool.coverage.report]`
        # (T-060, Harness A3). Coverage gates only fire when `--cov=app`
        # is on the command line, so we keep the flag here and let
        # coverage.py compare against the threshold itself. Tighten by
        # editing `fail_under` in pyproject.toml, not by drifting the
        # CI command away from the local `pytest --cov=app`
        # invocation documented in README.
        working-directory: api
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/test
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-report=term --cov-report=xml

      - name: Upload coverage.xml
        # 14-day retention (vs. provider-contract's 30) — coverage XML is
        # cheap to regenerate from a re-run, and the artifact mostly
        # exists so a reviewer can spot-check specific module gaps when
        # the gate trips. Soft-deletion after two sprints keeps the
        # artifact bin tidy.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage.xml
          retention-days: 14

  frontend-lint-test:
    name: frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Prettier
        working-directory: web
        run: pnpm format:check

      - name: ESLint
        working-directory: web
        run: pnpm lint

      - name: Typecheck
        working-directory: web
        run: pnpm tsc --noEmit

      - name: Vitest
        working-directory: web
        run: pnpm test

  e2e:
    name: e2e (Playwright on docker compose stack)
    needs: [backend-lint-test, frontend-lint-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env for compose
        # docker-compose.yml interpolates ${VAR} from this file and api/web
        # services pick it up via `env_file: .env`. Secrets are throwaway —
        # they never leave the runner.
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=cf_test_pw
          REDIS_PASSWORD=cf_test_redis
          JWT_SECRET=ci_jwt_secret_not_for_prod_0123456789abcdef0123456789abcdef
          STORAGE_SIGNED_URL_SECRET=ci_storage_secret_not_for_prod_0123456789abcdef
          # T-052: docker-compose.yml interpolates these for the Authentik
          # services. Empty values trip authentik-postgres init (refuses to
          # start without POSTGRES_PASSWORD) which fans out to authentik-
          # server / nginx via the dependency chain — the whole `up -d` fails.
          AUTHENTIK_POSTGRES_PASSWORD=cf_test_authentik_pw
          AUTHENTIK_SECRET_KEY=ci_authentik_secret_not_for_prod_0123456789abcdef0123456789abcdef
          OPENAI_API_KEY=
          SEEDANCE_API_KEY=
          ANTHROPIC_API_KEY=
          POSTGRES_DB=character_foundry
          POSTGRES_USER=cf_app
          DATABASE_URL=postgresql+asyncpg://cf_app:cf_test_pw@postgres:5432/character_foundry
          REDIS_URL=redis://:cf_test_redis@redis:6379/0
          STORAGE_ROOT=/storage
          WORKER_CONCURRENCY=4
          LOG_LEVEL=INFO
          # Default is true (`api/app/ai/config.py`); set explicitly so a
          # future config change can't silently flip CI onto the real
          # OpenAI client and start charging the account.
          AI_STUB_MODE=true
          SOFT_DELETE_RETENTION_DAYS=30
          TASK_TERMINAL_RETENTION_HOURS=24
          VITE_API_BASE_URL=/api
          VITE_STORAGE_BASE_URL=/storage
          VITE_APP_VERSION=0.1.0-ci
          EOF

      - name: Start stack
        # Use only the base compose — the override mounts host paths that
        # don't exist on the runner.
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost/api/health > /dev/null; then
              echo "stack ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "stack failed to come up"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --tail=200
          exit 1

      - name: Apply migrations
        run: docker compose -f docker-compose.yml exec -T api alembic upgrade head

      - name: Seed E2E users
        run: docker compose -f docker-compose.yml exec -T api python -m app.cli seed-e2e

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --tail=500

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
