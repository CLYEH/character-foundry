# Pre-commit hooks for Character Foundry.
#
# Install once per clone:
#   pip install pre-commit
#   pre-commit install
#
# Most hooks run against the project's own tools (pip env + web/node_modules),
# so pinned versions in pyproject.toml / package.json are the single source
# of truth — no second dependency pin lives there.
#
# Exception (gitleaks, T-061 / Harness A4): the secret scanner is a Go
# binary, has no place in `pyproject.toml` or `package.json`, and CI runs
# the same scan via `gitleaks-action`. We let pre-commit fetch its own
# pinned binary so devs without Go installed still get the hook for free.

repos:
  # ---------------------------------------------------------------------
  # Secret scan (T-061). Scans the staged diff against
  # `gitleaks.toml` at the repo root. CI counterpart lives in the
  # `security` job of `.github/workflows/pr.yml`; both must stay in
  # sync — bump `rev` here and the workflow action version together.
  # ---------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # ---- Backend (api/) ----
      - id: ruff-check
        name: ruff check (api)
        language: system
        entry: ruff check --fix
        files: ^api/.*\.py$
        exclude: ^api/alembic/versions/

      - id: ruff-format
        name: ruff format (api)
        language: system
        entry: ruff format
        files: ^api/.*\.py$
        exclude: ^api/alembic/versions/

      - id: mypy
        name: mypy (api)
        language: system
        entry: bash -c 'cd api && mypy app/'
        pass_filenames: false
        files: ^api/app/.*\.py$

      # ---- Frontend (web/) ----
      # We invoke eslint / prettier on the whole web/ tree rather than the
      # staged files — simpler and avoids the repo-root vs web/-root path
      # translation gymnastics pre-commit would otherwise require.
      - id: eslint-web
        name: eslint (web)
        language: system
        entry: bash -c 'cd web && pnpm exec eslint --fix .'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|js|jsx)$

      - id: prettier-web
        name: prettier (web)
        language: system
        entry: bash -c 'cd web && pnpm exec prettier --write .'
        pass_filenames: false
        files: ^web/.*\.(ts|tsx|js|jsx|css|html|json|md|yml|yaml)$
