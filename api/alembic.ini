# Alembic configuration for Character Foundry.
# sqlalchemy.url is intentionally empty - env.py reads DATABASE_URL from the
# process environment so the same config works for dev, CI, and tests.
# (ASCII-only on purpose: configparser reads with locale encoding, which is
# cp950 on Chinese Windows and chokes on a literal em dash.)

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
