# Platform-level fixed image / video constraints (backend/prompt-reconciler.md §3).
#
# Version bump rules:
#   - additive change (new entry, tightening wording) → minor (v1 → v1.1)
#   - removed / behaviorally-incompatible change → major (v1 → v2)
# GenerationLog records the version active at call time for traceability.
# (Bumping rule rephrased in T-047 — additive entries are forward-compatible
# for downstream callers and don't warrant a major version flip.)
version: v1.1
updated_at: 2026-05-01

base_creation:
  - transparent background
  - character centered in frame
  - character facing camera directly (正面)
  - full body shot unless specified otherwise
  - head and feet fully visible within frame, no cropping at edges
  - generous head room above the character
  - consistent neutral lighting
  - no watermarks or signatures

alias_creation:
  - inherits base_creation rules
  - preserves character identity from base image

motion_creation:
  - transparent background (match base)
  - camera remains stationary
  - character stays centered
  - smooth, realistic motion
  - no sudden frame jumps or distortions
  - duration 3-6 seconds for preset, 3-10 for custom
