# Local dev overlay — automatically merged with docker-compose.yml when
# running `docker compose up`. Bind-mounts source for hot-reload and exposes
# internal service ports for direct access.

services:
  api:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./api/app:/app/app
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
      - ./api/tests:/app/tests
      # Without this mount the YAML is build-time copied into the image
      # and host edits don't reach the container until rebuild — bit us
      # in T-047/T-048 (CI saw a v1.1 bump that local pytest missed).
      - ./api/platform_constraints.yaml:/app/platform_constraints.yaml
      # T-060: mutmut config + drift checker need three host paths
      # available in the container. `api/scripts/` and `pyproject.toml`
      # are obvious. `.harness/` (which holds the committed mutation
      # baseline) is mounted at `/app/.harness` so the local repro
      # command in the README (`--baseline .harness/mutation-baseline.json`
      # relative to `/app/`) matches what mutmut + the drift checker
      # already see — root-level binds at `/.harness` are unusual and
      # caused friction on some Docker Desktop configurations.
      - ./api/scripts:/app/scripts
      - ./api/pyproject.toml:/app/pyproject.toml
      - ./.harness:/app/.harness
    ports:
      - "8000:8000"
    # Expose postgres to the host for pytest / alembic runs outside the container
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-}

  worker:
    # Mirror the api service so worker code edits hot-reload would-be
    # nice-to-have. arq doesn't auto-reload; restart `worker` after
    # touching app/workers/* to pick up changes.
    volumes:
      - ./api/app:/app/app
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
      - ./api/platform_constraints.yaml:/app/platform_constraints.yaml

  postgres:
    ports:
      - "5432:5432"

  web:
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # T-052: expose authentik admin UI to host during initial setup
  # (akadmin first-login token flow needs direct :9000 access).
  # Phase 1 / prod 走 nginx /oauth/ 反代，不對外開 9000/9443
  # (per planning/devops/authentik-stack.md §3.1 + ticket §Notes).
  #
  # Loopback-bind (127.0.0.1:) so the Authentik bootstrap-setup flow
  # is not reachable from the LAN before T-053 promotes a real admin.
  # Without the loopback prefix Docker binds 0.0.0.0 — anyone on the
  # dev box's network (or a misconfigured firewall) could hit
  # /-/flow/initial-setup/ and become akadmin first. T-053 owns the
  # full IdP / client / admin setup; until it lands, keep the bootstrap
  # surface localhost-only.
  authentik-server:
    environment:
      AUTHENTIK_LOG_LEVEL: debug
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9443:9443"
    # T-073 + T-079: mount the curated subset of blueprints into dev. A
    # single-file mount per blueprint (not the whole
    # infra/authentik/blueprints/ dir like docker-compose.test.yml uses)
    # keeps the e2e-only cf-e2e-bootstrap.yaml — which seeds test users +
    # an implicit-consent SPA provider that would clash with the dev
    # admin-UI setup — out of the dev Authentik. The blueprints listed
    # here are pure structural config (no secrets, no test fixtures).
    #
    # cf-builtin-flow-hardening.yaml (T-079) references the policy object
    # `cf-google-init-next-validation` defined in cf-google-init.yaml, so
    # both files must be mounted together (the second `!Find`s into the
    # first at blueprint-apply time). Mount order doesn't matter — the
    # importer resolves dependencies; we list cf-google-init.yaml first
    # only for readability.
    volumes:
      - ./infra/authentik/blueprints/cf-google-init.yaml:/blueprints/cf/cf-google-init.yaml:ro
      - ./infra/authentik/blueprints/cf-builtin-flow-hardening.yaml:/blueprints/cf/cf-builtin-flow-hardening.yaml:ro
      # T-094: provision the human-driven MCP OAuth app (character-foundry-mcp)
      # for dev — see infra/authentik/blueprints/cf-mcp-dev.yaml header.
      - ./infra/authentik/blueprints/cf-mcp-dev.yaml:/blueprints/cf/cf-mcp-dev.yaml:ro

  # T-073: the worker is what actually applies blueprints — it must see
  # the same mounts as the server (mirrors docker-compose.test.yml).
  authentik-worker:
    volumes:
      - ./infra/authentik/blueprints/cf-google-init.yaml:/blueprints/cf/cf-google-init.yaml:ro
      - ./infra/authentik/blueprints/cf-builtin-flow-hardening.yaml:/blueprints/cf/cf-builtin-flow-hardening.yaml:ro
      - ./infra/authentik/blueprints/cf-mcp-dev.yaml:/blueprints/cf/cf-mcp-dev.yaml:ro
