# Local dev overlay — automatically merged with docker-compose.yml when
# running `docker compose up`. Bind-mounts source for hot-reload and exposes
# internal service ports for direct access.

services:
  api:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./api/app:/app/app
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
      - ./api/tests:/app/tests
      # Without this mount the YAML is build-time copied into the image
      # and host edits don't reach the container until rebuild — bit us
      # in T-047/T-048 (CI saw a v1.1 bump that local pytest missed).
      - ./api/platform_constraints.yaml:/app/platform_constraints.yaml
      # T-060: mutmut config + drift checker need three host paths
      # available in the container. `api/scripts/` and `pyproject.toml`
      # are obvious. `.harness/` (which holds the committed mutation
      # baseline) is mounted at `/app/.harness` so the local repro
      # command in the README (`--baseline .harness/mutation-baseline.json`
      # relative to `/app/`) matches what mutmut + the drift checker
      # already see — root-level binds at `/.harness` are unusual and
      # caused friction on some Docker Desktop configurations.
      - ./api/scripts:/app/scripts
      - ./api/pyproject.toml:/app/pyproject.toml
      - ./.harness:/app/.harness
    ports:
      - "8000:8000"
    # Expose postgres to the host for pytest / alembic runs outside the container
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-}

  worker:
    # Mirror the api service so worker code edits hot-reload would-be
    # nice-to-have. arq doesn't auto-reload; restart `worker` after
    # touching app/workers/* to pick up changes.
    volumes:
      - ./api/app:/app/app
      - ./api/alembic:/app/alembic
      - ./api/alembic.ini:/app/alembic.ini
      - ./api/platform_constraints.yaml:/app/platform_constraints.yaml

  postgres:
    ports:
      - "5432:5432"

  web:
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
