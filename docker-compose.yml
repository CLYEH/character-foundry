services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?must be set}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?must be set}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  api:
    build:
      context: ./api
    env_file:
      - .env
    # Shared filesystem with `worker` — the worker writes generated images
    # here (LocalFilesystemBackend.put), and the api streams them out via
    # `GET /storage/{key}` (T-046). Without this they had separate
    # ephemeral filesystems and api 404'd on worker-written files.
    volumes:
      - storage_data:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    restart: unless-stopped

  worker:
    # Same image as `api` so handlers share the codebase + dependencies.
    # Worker speaks arq's Redis protocol directly; it does NOT serve HTTP.
    build:
      context: ./api
    command: ["arq", "app.workers.arq_worker.WorkerSettings"]
    env_file:
      - .env
    volumes:
      - storage_data:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    restart: unless-stopped

  web:
    build:
      context: ./web
    env_file:
      - .env
    read_only: true
    cap_drop:
      - ALL
    # Vite dev server needs three writable paths the read_only rootfs seals:
    # node_modules/.vite (dep-optimization cache), node_modules/.vite-temp
    # (where it bundles the .ts config before importing it), and /tmp
    # (esbuild). In dev the override mounts ./web + an anon node_modules
    # volume on top, so these tmpfs only bite in the mount-less base/CI
    # (test.yml) stack — which is exactly where the e2e gate drives Vite
    # through nginx. Verified mount-less: vite boots under read_only with
    # exactly these three (without .vite-temp it ENOENTs on config load).
    tmpfs:
      - /tmp
      - /app/node_modules/.vite
      - /app/node_modules/.vite-temp
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - authentik-server
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /var/cache/nginx
    restart: unless-stopped

  # ── Authentik OAuth provider (T-052) ─────────────────────────────────
  # Dedicated postgres + redis per planning/devops/authentik-stack.md §3
  # (do not share with the app's `postgres`/`redis` — namespace collision +
  # blast-radius isolation). Named volumes (not bind-mounts) per §2.1 so
  # worktrees don't cross-pollute state (STATUS.md S3-3).
  authentik-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?must be set}
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
    restart: unless-stopped

  # Intentionally NO --requirepass: authentik-redis is reachable only on the
  # compose private network and Authentik connects without auth. If this
  # service is ever exposed beyond the compose net, add --requirepass AND
  # AUTHENTIK_REDIS__PASSWORD together (changing one without the other will
  # break Authentik silently — the ping healthcheck still passes because
  # `NOAUTH` reply doesn't match `PONG` only if auth IS required).
  authentik-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - authentik_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  # Image pin: `2024.12` is the LTS major.minor *rolling* tag — patch
  # releases (2024.12.x) auto-pick-up on `docker compose pull`. Not a
  # digest pin; the deliberate trade is "stay on the LTS line, take
  # backported security fixes automatically". M3.5 ship-prep ticket
  # will tighten to a digest pin + upgrade SOP.
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?must be set}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?must be set}
      AUTHENTIK_REDIS__HOST: authentik-redis
      # Sub-path hosting under nginx `/oauth/` — Authentik then emits all
      # redirect / absolute URLs with the `/oauth/` prefix instead of `/`.
      # Required leading + trailing slash per goauthentik.io configuration
      # docs. Without this, the OAuth authorize / callback redirects bounce
      # to root paths and break login flows once T-053 wires the IdP.
      AUTHENTIK_WEB__PATH: /oauth/
    # `/certs` holds OIDC/SAML signing key material — must persist across
    # container recreate or every restart rotates the keys and invalidates
    # tokens already issued. AC #4 (Authentik 設定持續 across down/up)
    # depends on this volume existing.
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      start_period: 60s
      interval: 30s
      retries: 3
      timeout: 30s
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    # Authentik runs as uid 1000 (no runtime privilege drop → no caps), and
    # routes temp through TMPDIR=/dev/shm (a docker-provided tmpfs that
    # read_only doesn't seal). /media + /certs are named volumes. The /tmp
    # tmpfs is belt-and-suspenders for any code path that bypasses TMPDIR.
    tmpfs:
      - /tmp
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?must be set}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?must be set}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_WEB__PATH: /oauth/
    # Mirror server: worker also reads /certs for OIDC/SAML signing.
    # No docker.sock mount — we don't use Authentik outposts (which would
    # auto-deploy outpost containers via the docker API). Outpost feature
    # remains disabled.
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      start_period: 60s
      interval: 30s
      retries: 3
      timeout: 30s
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  storage_data:
  authentik_postgres_data:
  authentik_redis_data:
  authentik_media:
  authentik_certs:
