worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Maps `Upgrade` request header → `Connection` upstream header so
    # WebSocket handshakes upgrade properly while regular HTTP requests
    # don't carry a stray `Connection: upgrade`. Used by `/oauth/` (T-052)
    # for Authentik admin/outpost WS endpoints.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:5173;
    }

    upstream authentik_upstream {
        server authentik-server:9000;
    }

    server {
        listen 80;
        server_name _;

        # API reverse proxy — strips /api prefix before forwarding
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentik OAuth provider reverse proxy (T-052).
        # `AUTHENTIK_WEB__PATH=/oauth/` (docker-compose.yml) tells Authentik
        # that everything it serves lives under `/oauth/...` — that prefix
        # is used for BOTH inbound routing AND emitted URLs. So nginx MUST
        # preserve the `/oauth/` prefix when proxying to upstream — the
        # absent trailing slash on `proxy_pass http://authentik_upstream;`
        # is load-bearing (a trailing slash would strip `/oauth/` and every
        # request 404s on the goauthentik :9000 router, surfaced by T-057
        # CI run #3: nginx access log showed 404 for /oauth/-/health/ready/
        # routed to upstream as /-/health/ready/).
        #
        # X-Forwarded-* hardening: replace (not append) inbound headers so
        # a client can't spoof source IP / scheme via `X-Forwarded-For: ...`
        # / `X-Forwarded-Proto: https`. Authentik uses these for audit log
        # IPs, rate-limit decisions, and cookie-secure inference; appending
        # to client input via `$proxy_add_x_forwarded_for` would let a
        # spoofer poison those.
        #
        # WebSocket upgrade: Authentik exposes `/ws/client/` + `/ws/outpost/`
        # for live event channels (admin UI + outpost coordination). HTTP/1.1
        # + Upgrade/Connection headers required for the WS handshake to
        # complete through this proxy.
        location /oauth/ {
            proxy_pass http://authentik_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Storage signed-URL proxy → api `/storage/{key:path}` (T-046).
        # No trailing slash on `proxy_pass` so the `/storage/` prefix is
        # preserved (the api route is mounted at top level, not under /v1
        # — see planning/backend/api-shape.md §5.8). Without this block
        # `/storage/*` falls through to the catch-all `location /` and
        # gets the SPA index.html, which makes `<img>` tags break.
        location /storage/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Vite dev server (web service)
        # WebSocket upgrade headers enable Vite HMR.
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
