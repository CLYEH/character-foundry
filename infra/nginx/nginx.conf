worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:5173;
    }

    server {
        listen 80;
        server_name _;

        # API reverse proxy — strips /api prefix before forwarding
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Storage signed-URL proxy → api `/storage/{key:path}` (T-046).
        # No trailing slash on `proxy_pass` so the `/storage/` prefix is
        # preserved (the api route is mounted at top level, not under /v1
        # — see planning/backend/api-shape.md §5.8). Without this block
        # `/storage/*` falls through to the catch-all `location /` and
        # gets the SPA index.html, which makes `<img>` tags break.
        location /storage/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Vite dev server (web service)
        # WebSocket upgrade headers enable Vite HMR.
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
