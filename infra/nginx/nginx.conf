worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:5173;
    }

    upstream authentik_upstream {
        server authentik-server:9000;
    }

    server {
        listen 80;
        server_name _;

        # API reverse proxy — strips /api prefix before forwarding
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentik OAuth provider reverse proxy (T-052).
        # `/oauth/` strips to `/` on the upstream so the existing Authentik
        # routes (`/-/health/...`, `/api/v3/...`, `/application/o/...`, etc.)
        # resolve unchanged. Acceptance criterion path
        # `/oauth/-/health/ready/` maps to `/-/health/ready/` on
        # `authentik-server:9000`. Sub-path hosting has known UI quirks
        # (Authentik emits absolute links that ignore the `/oauth` prefix);
        # if those surface during T-053 we revisit subdomain hosting
        # (`auth.character-foundry.local`) per planning §3.1.
        #
        # X-Forwarded-* hardening: replace (not append) inbound headers so
        # a client can't spoof source IP / scheme via `X-Forwarded-For: ...`
        # / `X-Forwarded-Proto: https`. Authentik uses these for audit log
        # IPs, rate-limit decisions, and cookie-secure inference; appending
        # to client input via `$proxy_add_x_forwarded_for` would let a
        # spoofer poison those.
        location /oauth/ {
            proxy_pass http://authentik_upstream/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Storage signed-URL proxy → api `/storage/{key:path}` (T-046).
        # No trailing slash on `proxy_pass` so the `/storage/` prefix is
        # preserved (the api route is mounted at top level, not under /v1
        # — see planning/backend/api-shape.md §5.8). Without this block
        # `/storage/*` falls through to the catch-all `location /` and
        # gets the SPA index.html, which makes `<img>` tags break.
        location /storage/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Vite dev server (web service)
        # WebSocket upgrade headers enable Vite HMR.
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
