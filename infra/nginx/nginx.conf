worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # Maps `Upgrade` request header → `Connection` upstream header so
    # WebSocket handshakes upgrade properly while regular HTTP requests
    # don't carry a stray `Connection: upgrade`. Used by `/oauth/` (T-052)
    # for Authentik admin/outpost WS endpoints.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_upstream {
        server api:8000;
    }

    upstream web_upstream {
        server web:5173;
    }

    upstream authentik_upstream {
        server authentik-server:9000;
    }

    server {
        listen 80;
        server_name _;

        # API reverse proxy — strips /api prefix before forwarding
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MCP streamable-HTTP reverse proxy (T-082) → api `/mcp` sub-app
        # (mounted in T-080). MCP spec uses a single endpoint, so this is a
        # path-only proxy — no SDK-specific routing.
        #
        # No trailing slash on `proxy_pass` so the `/mcp/` prefix is
        # preserved (the FastMCP sub-app is mounted at `/mcp`, same reasoning
        # as the `/oauth/` and `/storage/` blocks above).
        #
        # `proxy_read_timeout 180s` (≥ 180s, the open-questions.md Q3 gotcha
        # #2 floor): an MCP tool that triggers i2v blocks 30–120s on the Veo
        # call while emitting `notifications/progress` over the chunked
        # stream. nginx's default 60s read timeout would sever the stream
        # mid-generation — and the agent's blocking poll loop is tuned to
        # this ceiling (`app/mcp/tools/*` `_POLL_TIMEOUT_S = 170 < 180`).
        # `proxy_send_timeout 180s` mirrors it on the client→upstream side.
        # Not longer (e.g. 600s): a genuinely-dead connection would then sit
        # holding an nginx worker slot for that long. prod cloud LBs
        # (GCP/AWS ALB) also default to 60s — that's a separate ship-prep
        # ticket, not this self-host nginx config.
        #
        # `proxy_buffering off` is required for streamable HTTP / SSE: with
        # buffering on, nginx withholds the chunked body until the response
        # completes or its buffer fills, so the agent never sees progress
        # notifications live.
        #
        # HTTP/1.1 + empty `Connection` is needed for chunked transfer (and
        # to avoid a stray `Connection: close`). MCP streamable HTTP is
        # HTTP/1.1 chunked, NOT WebSocket, so the `/oauth/` block's
        # `Upgrade` / `Connection: upgrade` headers are deliberately absent.
        #
        # X-Forwarded-For uses `$remote_addr` (replace, not append) per the
        # `/oauth/` hardening pattern, so a client can't spoof source IP.
        location /mcp/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_buffering off;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Exact match for the bare `/mcp` path (no trailing slash). Without
        # this, the prefix `location /mcp/` above triggers nginx's built-in
        # 301 redirect for a slash-suffixed proxied prefix (it returns
        # `301 → /mcp/` for a request to `/mcp`). MCP / JSON-RPC clients
        # don't reliably follow POST redirects — that's exactly why
        # `app/mcp/app.py::MCPPathNormalizationMiddleware` rewrites `/mcp`
        # → `/mcp/` IN-PROCESS instead of redirecting. An nginx 301 would
        # short-circuit before the request ever reaches that middleware, so
        # a client pointed at `.../mcp` could fail `initialize`. Route the
        # bare path straight through (no trailing slash on `proxy_pass`) and
        # let the app middleware do the normalization. Directives mirror the
        # `/mcp/` block above (same upstream, timeouts, buffering, headers).
        location = /mcp {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection        "";
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_buffering off;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authentik OAuth provider reverse proxy (T-052).
        # `AUTHENTIK_WEB__PATH=/oauth/` (docker-compose.yml) tells Authentik
        # that everything it serves lives under `/oauth/...` — that prefix
        # is used for BOTH inbound routing AND emitted URLs. So nginx MUST
        # preserve the `/oauth/` prefix when proxying to upstream — the
        # absent trailing slash on `proxy_pass http://authentik_upstream;`
        # is load-bearing (a trailing slash would strip `/oauth/` and every
        # request 404s on the goauthentik :9000 router, surfaced by T-057
        # CI run #3: nginx access log showed 404 for /oauth/-/health/ready/
        # routed to upstream as /-/health/ready/).
        #
        # X-Forwarded-* hardening: replace (not append) inbound headers so
        # a client can't spoof source IP / scheme via `X-Forwarded-For: ...`
        # / `X-Forwarded-Proto: https`. Authentik uses these for audit log
        # IPs, rate-limit decisions, and cookie-secure inference; appending
        # to client input via `$proxy_add_x_forwarded_for` would let a
        # spoofer poison those.
        #
        # WebSocket upgrade: Authentik exposes `/ws/client/` + `/ws/outpost/`
        # for live event channels (admin UI + outpost coordination). HTTP/1.1
        # + Upgrade/Connection headers required for the WS handshake to
        # complete through this proxy.
        location /oauth/ {
            proxy_pass http://authentik_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Storage signed-URL proxy → api `/storage/{key:path}` (T-046).
        # No trailing slash on `proxy_pass` so the `/storage/` prefix is
        # preserved (the api route is mounted at top level, not under /v1
        # — see planning/backend/api-shape.md §5.8). Without this block
        # `/storage/*` falls through to the catch-all `location /` and
        # gets the SPA index.html, which makes `<img>` tags break.
        location /storage/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Vite dev server (web service)
        # WebSocket upgrade headers enable Vite HMR.
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
